name: Dynamic Job Example

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: 'Enter the job name'
        required: true
        default: 'build'
      environment:
        description: 'Choose environment'
        required: true
        default: 'production'

jobs:
  dynamic-job:
    runs-on: ubuntu-latest
    name: ${{ github.event.inputs.job_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run setup for ${{ github.event.inputs.environment }}
        run: |
          echo "Setting up for ${{ github.event.inputs.environment }}"