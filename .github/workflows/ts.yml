name: ts

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: 'Enter a custom name for this run'
        required: true
        default: 'default-name'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Compile the project with custom name: ${{ github.event.inputs.custom_name }}
        run: |
          echo "Compiling project with name: ${{ github.event.inputs.custom_name }}"

      - name: Display the custom name in step
        run: |
          echo "Custom name for this run: ${{ github.event.inputs.custom_name }}"